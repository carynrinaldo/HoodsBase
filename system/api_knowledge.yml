# api_knowledge.yml — ServiceTrade API field knowledge
#
# Source of truth for regenerating context.yml from mappings.yml.
# Captures all field-level decisions from API docs + business context
# that can't be derived from the live API response alone.
#
# Usage: python system/rebuild_context.py
# Input:  schema/mappings.yml (auto-generated by rebuild_mappings.py)
# Output: schema/context.yml  (transformation rules for generate_schema.py)
#
# Architecture:
#   endpoints.yml → rebuild_mappings.py → mappings.yml ─┐
#   api_knowledge.yml ──────────────────────────────────┤→ rebuild_context.py → context.yml
#                                                        │
#   mappings.yml + context.yml → generate_schema.py → schema.sql (MCP prompt)

# ═══════════════════════════════════════════════════════════════
# GLOBAL RULES — applied automatically to every field
# ═══════════════════════════════════════════════════════════════
# These derive the ~80% of context.yml entries that are purely mechanical.
# The rebuild script applies these FIRST, then overlays per-resource overrides.

global_rules:

  # ── Skip rules ──────────────────────────────────────────────
  # Fields to always exclude from the database
  always_skip:
    - uri                # internal API reference URL, not useful in DB

  # Fields to always mark as skip: true in context.yml
  # (generate_schema.py needs explicit skip entries for these)
  always_skip_fields:
    - tags               # handled via separate tag table, not inline
    - offices            # array of Location objects, not needed inline

  # ── Type coercion ───────────────────────────────────────────
  # API boolean → SQLite INTEGER (SQLite has no native boolean)
  boolean_to_integer: true

  # ── Naming ──────────────────────────────────────────────────
  # Convert all camelCase API field names to snake_case for db_column
  camel_to_snake: true

  # ── FK object extraction ────────────────────────────────────
  # When mappings.yml says api_type: object with 'id' in nested_keys,
  # apply: extract_key: id, db_type: integer, append _id to db_column
  # Exception: fields listed in skip or with skip_fk_extract in overrides
  fk_object_extract: true

  # ── Array handling ──────────────────────────────────────────
  # Arrays of objects (api_type: array with array_item_keys) → skip
  # Arrays of primitives → db_type: text (stored as JSON)
  array_of_objects_skip: true

  # ── Address flattening ──────────────────────────────────────
  # Any field named 'address' with api_type: object → flatten to columns
  address_flatten:
    street: address_street
    city: address_city
    state: address_state
    postalCode: address_postal

  # ── Standard field renames ──────────────────────────────────
  # Applied across all resources where these field names appear
  field_renames:
    created:
      db_column: created_at
      db_type: timestamp
    updated:
      db_column: updated_at
      db_type: timestamp
    phoneNumber:
      db_column: phone
    externalIds:
      db_column: external_ids
      db_type: text


# ═══════════════════════════════════════════════════════════════
# KNOWN TIMESTAMP FIELDS
# ═══════════════════════════════════════════════════════════════
# Integer fields that are Unix timestamps (not counts/amounts).
# These get db_type: timestamp → INTEGER in SQLite with _dt companion.
# The API docs say: "Dates and date-times are represented as Unix
# timestamps (seconds since January 1, 1970 at midnight UTC.)"

timestamp_fields:
  - completedOn
  - dueAfter
  - dueBy
  - dueDate
  - endsOn
  - expiresOn
  - firstEnd
  - firstStart
  - latestAccepted
  - latestClockIn
  - latestSubmission
  - reportedOn
  - respondBy
  - scheduledDate
  - transactionDate
  - windowEnd
  - windowStart


# ═══════════════════════════════════════════════════════════════
# TYPE CORRECTIONS
# ═══════════════════════════════════════════════════════════════
# Fields where API type inference is unreliable because the inferred
# type depends on sample data. Applied globally across all resources.
# Resource-level overrides in resource_overrides still take priority.

type_corrections:
  subtotal: real        # money — inferred as integer when no fractional part
  estimatedPrice: real  # money
  orderIndex: integer   # sort position — API returns as text string


# ═══════════════════════════════════════════════════════════════
# BOOLEAN FIELD RENAMES (is_ prefix)
# ═══════════════════════════════════════════════════════════════
# Some API boolean fields lack the 'is' prefix. Add it for clarity.
# Only needed when the API name doesn't already start with 'is'.
# The boolean_to_integer rule handles the type; this handles the name.

is_prefix_renames:
  customer: is_customer          # company — API returns bare boolean
  vendor: is_vendor              # company
  partsVendor: is_parts_vendor   # company
  primeContractor: is_prime_contractor  # company
  paid: is_paid                  # invoice
  sent: is_sent                  # invoice


# ═══════════════════════════════════════════════════════════════
# ENUM VALUES FOR PROMPT COMMENTS
# ═══════════════════════════════════════════════════════════════
# Enum/status values that become inline SQL comments.
# Keyed by: field_name.resource_name (resource optional if universal).
# These are the values Claude needs to write correct WHERE clauses.

enums:
  # ── status ──────────────────────────────────────────────────
  status.company: "active|pending|inactive|on_hold"
  status.location: "active|inactive|pending"
  status.contact: "public|private|inactive"
  status.job: "new|scheduled|canceled|bidding|completed|pending_invoice|sending_invoice|invoiced|closed"
  status.appointment: "scheduled|unscheduled|canceled_by_vendor|canceled_by_customer|completed|no_show"
  status.invoice: "ok|internal_review|pending_accounting|processed|paid|sent|failed|void"
  status.quote: "accepted|canceled|draft|new|rejected|submitted"
  status.asset: "active|inactive"
  status.deficiency: "new|invalid|verified|fixed"
  status.user: "active|inactive"

  # ── substatus ───────────────────────────────────────────────
  substatus.job: "pending_approval|po_hold|construction_hold|awaiting_parts|rework_required|needs_review_sales|needs_review_ops|sales_approved|ops_approved|null"
  substatus.invoice: "pending|review_needed|needs_review_sales|rejected|sales_approved|approved|null"
  substatus.quote: "customer_hold|needs_review_ops|needs_review_sales|negotiation|on_hold|ops_approved|ready_to_sent|requote|sales_approved|null"

  # ── type ────────────────────────────────────────────────────
  type.job: "cleaning|inspection|repair|construction|upgrade|etc"
  type.invoice: "invoice|vendorbill|external|unknown"
  type.asset: "location|kitchen_exhaust_hood|kitchen_exhaust_system|etc"

  # ── other enums ─────────────────────────────────────────────
  severity.deficiency: "suggested|deficient|inoperable"
  resolution.deficiency: "new|invalid|fixed|out_for_quote|notified|rejected"
  reportSource.deficiency: "manual|lsn|ivr|mobile|jcw"
  frequency.servicerecurrence: "daily|weekly|monthly|yearly|null(task_list)"
  schedulingType.servicerecurrence: "default|task_list"
  frequencyCategory.servicerecurrence: "for task_list only: monthly|quarterly|semi-annually|annually|multi-year"
  deficiencySeverity.quote: "suggested|deficient|inoperable|null"
  ivrActivity.job: "onsite|offsite|enroute|null"
  jobType.quote: "cleaning|inspection|repair|etc"


# ═══════════════════════════════════════════════════════════════
# PER-RESOURCE OVERRIDES
# ═══════════════════════════════════════════════════════════════
# Field-specific rules that OVERRIDE or EXTEND global rules.
# These capture API-doc knowledge that can't be derived from patterns.
#
# Only include entries that differ from what global rules would produce.
# The rebuild script merges these on top of the auto-derived rules.

resource_overrides:

  serviceline:
    description: >
      Trade categories (e.g. Kitchen Exhaust Cleaning, Pressure Washing,
      Grease Containment). Each job and service recurrence is tied to a
      service line.
    fields:
      trade:
        prompt_comment: 'e.g. "Exhaust Cleaning", "Pressure Washing"'
      abbr:
        prompt_comment: "short code e.g. KEC, GC, PRWSH"
      icon:
        db_column: icon_url  # rename from 'icon' for clarity

  company:
    description: >
      Customer or vendor business. Most are customers (is_customer=1).
      Some are vendors or prime contractors.
    fields:
      # Skip: internal/UI fields we don't need
      managingAccount:
        skip: true  # Account object, not relevant for our use case
      shareId:
        skip: true  # cross-account sharing ID
      serviceLinesProvided:
        skip: true  # array of ServiceLine — vendor-only, handled elsewhere
      logo:
        skip: true  # attachment object (id/uri/contentUrl/aspect)

  location:
    description: >
      Physical service address under a company. Hood cleaning is
      performed at the location level.
    fields:
      generalManager:
        db_column: general_manager
        prompt_comment: "name text, not a FK"
        # This is a plain text field, NOT an object — override FK extract
        skip_fk_extract: true
      storeNumber:
        db_column: store_number
        prompt_comment: "deprecated, use ref_number"
      offices:
        skip: true  # array of Location objects — not needed
      remitToAddress:
        skip: true  # address object for remittance — not needed
      remitToSource:
        db_column: remit_to_source
      # Fields that may appear as api_type: unknown (null in first page)
      legacyId:
        db_column: legacy_id
        db_type: integer
      taxGroup:
        db_column: tax_group_id
        db_type: integer
        extract_key: id
      brand:
        db_column: brand_id
        db_type: integer
        extract_key: id

  contact:
    description: >
      Person associated with companies and/or locations.
      Can be linked to multiple.
    fields:
      type:
        skip: true  # DEPRECATED — singular string, use 'types' instead
      types:
        db_type: text
        prompt_comment: "JSON array e.g. management, sales, Invoice/Report"
      companies:
        skip: true  # array of Company — handled via join tables
      locations:
        skip: true  # array of Location — handled via join tables
      company:
        skip: true  # DEPRECATED singular FK, use companies array
      location:
        skip: true  # DEPRECATED singular FK, use locations array

  job:
    description: >
      Work order — the central entity. Tied to customer, location, vendor.
      API defaults to status=scheduled unless another status is specified.
    fields:
      jobTypeWeight:
        prompt_comment: "higher = higher importance"
      visibility:
        db_type: text  # override: array stored as JSON text
      sectionVisibilities:
        db_column: section_visibilities
        db_type: text
      serviceLine:
        db_column: service_line
        prompt_comment: "DEPRECATED text abbr, not a FK"
        skip_fk_extract: true  # CRITICAL: this is a plain text field, NOT a FK object
      scheduledDate:
        prompt_comment: "most recent open appointment"
      estimatedPrice:
        prompt_comment: "sum of non-canceled service requests"
      ivrOpen:
        db_column: ivr_open
        prompt_comment: "1 if last IVR event was clock-in"
      offices:
        skip: true
      tags:
        skip: true
      appointments:
        skip: true
      serviceLinkAttachmentCategoryVisibility:
        db_column: service_link_attachment_category_visibility
        db_type: text
      currentAppointment:
        db_column: current_appointment_id
      # Fields that may appear as api_type: unknown (null in first page)
      customName:
        db_column: custom_name
        db_type: text
      substatus:
        db_type: text
      displaySubstatus:
        skip: true  # human-readable alias of substatus, redundant
      ivrActivity:
        db_column: ivr_activity
        db_type: text
        prompt_comment: "onsite|offsite|enroute|null"
      percentComplete:
        db_column: percent_complete
        db_type: integer
      sales:
        db_column: sales_id
        db_type: integer
        extract_key: id
      project:
        db_column: project_id
        db_type: integer
        extract_key: id

  appointment:
    description: >
      Scheduled time block on a job — dispatch board entry.
      Jobs can have multiple appointments.
    fields:
      serviceRequests:
        skip: true  # array of ServiceRequest — separate resource
      techs:
        skip: true  # array of User — handled via join
      offices:
        skip: true  # array of Location — not needed

  invoice:
    description: >
      Bill sent to customer. Line items extracted into invoice_item table.
    fields:
      # assignedUser often null in API → api_type: unknown in mappings
      # but it IS a User FK object when present
      assignedUser:
        db_column: assigned_user_id
        db_type: integer
        extract_key: id
      terms:
        skip: true  # often null/unknown in responses, not useful
      items:
        skip: true  # extracted into invoice_item child resource
      tags:
        skip: true
      visibility:
        db_type: text  # array of strings, store as JSON
      # Fields that may appear as api_type: unknown (null in first page)
      substatus:
        db_type: text
      totalPaidAmount:
        db_column: total_paid_amount
        db_type: real
      paymentTerms:
        db_column: payment_terms_id
        db_type: integer
        extract_key: id

  invoiceitem:
    description: >
      Line item on an invoice. Extracted from parent invoice
      response during sync.
    fields:
      # Money fields: API sometimes returns integers (e.g. quantity=1),
      # but these are real-valued in general
      quantity:
        db_type: real
      price:
        db_type: real
      # subtotal: handled by global type_corrections (subtotal → real)
      invoice:
        skip: true  # parent reference — sync.py adds invoice_id from parent
      invoiceRecurrence:
        skip: true  # FK to invoice recurrence, not needed
      windowStart:
        skip: true  # appointment window, not needed on line items
      windowEnd:
        skip: true  # appointment window, not needed on line items
      # FK objects that may appear as api_type: unknown
      taxGroup:
        db_column: tax_group_id
        db_type: integer
        extract_key: id
      serviceRequest:
        db_column: service_request_id
        db_type: integer
        extract_key: id

  quote:
    description: >
      Proposal for planned work. Lifecycle: draft→submitted→accepted/rejected.
      Line items extracted into quote_item table.
    fields:
      # Money fields: API returns formatted strings — type handled by global type_corrections
      subtotal:
        prompt_comment: "API returns formatted string, stored as real"
      taxAmount:
        db_column: tax_amount
        db_type: real
      totalPrice:
        db_column: total_price
        db_type: real
      deficiencyJobs:
        db_column: deficiency_jobs
        db_type: text  # array stored as JSON
      serviceLines:
        skip: true
      jobs:
        skip: true
      items:
        skip: true  # extracted into quote_item child resource
      tags:
        skip: true
      serviceRequests:
        skip: true
      visibility:
        db_type: text
      substatus:
        db_type: text
      taskingDetailLevel:
        db_column: tasking_detail_level
      sectionVisibilities:
        db_column: section_visibilities
        db_type: text
      # FK objects that appear as api_type: unknown (null in first page)
      sales:
        db_column: sales_id
        db_type: integer
        extract_key: id
      terms:
        db_column: terms_id
        db_type: integer
        extract_key: id

  quoteitem:
    description: >
      Line item on a quote. Full detail via /quote/{id}/item endpoint.
    fields:
      # Money fields: API sometimes returns integers, but these are real-valued
      quantity:
        db_type: real
      price:
        db_type: real
      cost:
        db_type: real
        prompt_comment: "internal cost, not shown to customer"
      taxRate:
        db_column: tax_rate
        db_type: real
      quote:
        skip: true  # parent reference — sync.py adds quote_id from parent
      # FK objects that may appear as api_type: unknown
      serviceRequest:
        db_column: service_request_id
        db_type: integer
        extract_key: id

  asset:
    description: >
      Equipment at a location — hoods, fans, filters. Hierarchical:
      location→building→system→hood. Requires updatedAfter filter param.
    fields:
      display:
        prompt_comment: "human-readable type name"
      properties:
        db_type: text
        prompt_comment: "flexible JSON — hood dimensions, filter sizes, fan specs"
      taskList:
        skip: true  # complex object, not needed in flat table
      isAbstractGroup:
        db_column: is_abstract_group
        prompt_comment: "grouping node, not a real asset"
      hasActiveTaskList:
        db_column: has_active_task_list
      # Fields that may appear as api_type: unknown (null in first page)
      legacyId:
        db_column: legacy_id
        db_type: integer
      orderIndex:
        db_column: order_index
        db_type: integer

  deficiency:
    description: >
      Compliance issue found during service. Reported against assets
      with severity levels. Lifecycle: new→verified/fixed/rejected.
    fields:
      proposedFix:
        db_column: proposed_fix
      lastReportedStatus:
        db_column: last_reported_status
      # FK objects that appear as api_type: unknown (null in first page)
      owner:
        db_column: owner_id
        db_type: integer
        extract_key: id
      sales:
        db_column: sales_id
        db_type: integer
        extract_key: id
      serviceLine:
        db_column: service_line_id
        db_type: integer
        extract_key: id

  servicerecurrence:
    description: >
      Recurring service schedule — critical for compliance. Defines how
      often a location/asset needs service. frequency+interval = "every
      [interval] [frequency]s" e.g. interval=3, frequency=monthly means
      quarterly.
      
      The `currently_due` and `current_service_recurrence_id` columns
      are populated via the `serviceRecurrence.nextDueService` sideload
      (see system/endpoints.yml). When a user manually edits the
      "Currently Due" date in the ServiceTrade UI, ServiceTrade creates
      a NEW recurrence record with the new date and links the old one
      via `current_service_recurrence_id`. The active recurrence for
      any location is the one where `id = current_service_recurrence_id`.
    fields:
      repeatWeekday:
        db_column: repeat_weekday
        prompt_comment: "monthly only: tied to specific weekday"
      frequencyCategory:
        db_column: frequency_category
        db_type: text
      preferredTechs:
        skip: true  # array of User — handled via join
      duration:
        prompt_comment: "seconds"
      preferredStartTime:
        db_column: preferred_start_time
        prompt_comment: "seconds from midnight"
      items:
        skip: true
      taskingDuration:
        skip: true
      tasks:
        skip: true
      taskLists:
        skip: true
      interval:
        prompt_comment: "every [interval] [frequency]s"
      # FK objects that appear as api_type: unknown (null in first page)
      parent:
        db_column: parent_id
        db_type: integer
        extract_key: id
        prompt_comment: "old recurrence when schedule modified"
      contract:
        db_column: contract_id
        db_type: integer
        extract_key: id
      preferredVendor:
        db_column: preferred_vendor_id
        db_type: integer
        extract_key: id
      # ── Sideload-derived fields (see system/endpoints.yml) ─────────
      currently_due:
        db_type: timestamp
        prompt_comment: "next due date from ServiceTrade UI; matches Currently Due column"
      currentServiceRecurrence:
        db_column: current_service_recurrence_id
        db_type: integer
        prompt_comment: "FK to currently active recurrence; equals id when this row is the active one"

  servicerecurrenceitem:
    description: >
      Line item on a service recurrence (parts, filters). Currently
      not needed in the schema — recurrence-level data is sufficient.
    skip_resource: true
  
  servicerequest:
    description: >
      Job-level service request — a specific item of work to be done
      (e.g. "Kitchen exhaust hood cleaning"). Derived from service
      recurrences, referenced by invoice_item and quote_item via
      service_request_id. Distinct from service_recurrence (location
      template) and invoice_item (billing line).
    fields:
      description:
        prompt_comment: 'e.g. "Kitchen exhaust hood cleaning"'
      duration:
        prompt_comment: "seconds"
      preferredStartTime:
        db_column: preferred_start_time
        prompt_comment: "seconds from midnight"
      visibility:
        db_type: text  # array stored as JSON
      items:
        skip: true  # child resource not synced
      preferredTechs:
        skip: true  # array of User — handled via join
      quoteRequests:
        skip: true  # array of quoterequest refs — not synced
      taskInstances:
        skip: true
      taskLists:
        skip: true
      originalWindowStart:
        db_column: original_window_start
        db_type: timestamp
      originalWindowEnd:
        db_column: original_window_end
        db_type: timestamp
      closedOn:
        db_column: closed_on
        db_type: timestamp
      serviceLinkAttachmentCategoryVisibility:
        db_column: service_link_attachment_category_visibility
        db_type: text
      # FK objects that appear as api_type: unknown (null in first page)
      changeOrder:
        db_column: change_order_id
        db_type: integer
        extract_key: id
      budget:
        db_column: budget_id
        db_type: integer
        extract_key: id
      preferredVendor:
        db_column: preferred_vendor_id
        db_type: integer
        extract_key: id
      quoteLinkAttachmentVisibility:
        db_column: quote_link_attachment_visibility
        db_type: integer
      quoteLinkCommentVisibility:
        db_column: quote_link_comment_visibility
        db_type: integer

  servicerequestitem:
    description: >
      Line item on a service request (sparse — id/uri/description only).
      Currently not needed in schema.
    skip_resource: true
    
  user:
    description: >
      ServiceTrade user — technicians, office staff, salespeople.
    fields:
      avatar:
        skip: true  # object with small/medium/large URLs
      account:
        skip: true  # Account object — internal
      serviceLines:
        skip: true  # array of ServiceLine
      roles:
        skip: true  # array of roles
      activities:
        db_type: text  # array stored as JSON
      mfaRequired:
        db_column: mfa_required
        db_type: integer  # boolean
      # FK object that appears as api_type: unknown (null in first page)
      manager:
        db_column: manager_id
        db_type: integer
        extract_key: id

  region:
    description: >
      Geographic territories. Currently empty (0 records).
    fields: {}

  tag:
    description: >
      Freeform labels for segmenting companies, locations, jobs, invoices.
    fields: {}

  taxrate:
    description: >
      Tax rates. Currently empty (0 records).
    fields: {}

  paymentterms:
    description: >
      Payment terms (e.g. Due Upon Receipt, Net 7, Net 30).
    fields: {}
